name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.Version=${{ github.sha }}" -o instagrant .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: instagrant
          path: instagrant

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          cp artifacts/instagrant/instagrant release/
          chmod +x release/*

      - name: Delete existing latest release
        uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          tag_name: latest
          github_token: ${{ secrets.GITHUB_TOKEN }}
          delete_release: true
        continue-on-error: true

      - name: Create latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Latest build from commit ${{ github.sha }}
            
            ## Quick Install
            
            ```bash
            curl -Lo instagrant https://github.com/${{ github.repository }}/releases/download/latest/instagrant && chmod +x instagrant
            ```
            
            ## Install to /usr/local/bin
            
            ```bash
            sudo install -m 755 <(curl -Lo- https://github.com/${{ github.repository }}/releases/download/latest/instagrant) /usr/local/bin/instagrant
            ```
          files: |
            release/instagrant
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
